<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Asterlane 控制台</title>
<style>
:root {
  --bg: #f6f7f9; --fg: #1c2128; --muted: #6a737d; --card: #ffffff;
  --border: #d8dde3; --accent: #3b5bdb; --ok: #2b8a3e; --err: #c92a2a; --warn: #d9480f;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #14171b; --fg: #dbe1e8; --muted: #8b949e; --card: #1d2126;
    --border: #30363d; --accent: #748ffc; --ok: #69b979; --err: #f08080; --warn: #ffa94d;
  }
}
* { box-sizing: border-box; }
body {
  margin: 0; background: var(--bg); color: var(--fg);
  font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
}
header {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  padding: 10px 20px; background: var(--card); border-bottom: 1px solid var(--border);
}
header h1 { font-size: 16px; margin: 0; }
header h1 span { color: var(--accent); }
#auth { display: flex; align-items: center; gap: 8px; margin-left: auto; }
#conn { font-size: 12px; color: var(--muted); }
#conn.ok { color: var(--ok); }
#conn.err { color: var(--err); }
input, button, select {
  font: inherit; color: inherit; background: var(--bg);
  border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px;
}
button { cursor: pointer; background: var(--card); }
button:hover { border-color: var(--accent); }
nav { display: flex; gap: 2px; padding: 8px 20px 0; flex-wrap: wrap; }
nav button { border: 1px solid transparent; border-radius: 6px 6px 0 0; color: var(--muted); background: none; }
nav button.active { background: var(--card); border-color: var(--border); border-bottom-color: var(--card); color: var(--fg); }
main { padding: 16px 20px; }
main h3 { font-size: 14px; margin: 16px 0 8px; }
.cards { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.card {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 18px; min-width: 140px;
}
.card .num { font-size: 24px; font-weight: 600; }
.card .lbl { font-size: 12px; color: var(--muted); }
.toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.tablewrap { overflow-x: auto; background: var(--card); border: 1px solid var(--border); border-radius: 8px; }
table { border-collapse: collapse; width: 100%; }
th, td { text-align: left; padding: 7px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
th { font-size: 12px; color: var(--muted); position: sticky; top: 0; background: var(--card); white-space: nowrap; }
tr:last-child td { border-bottom: none; }
td { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12.5px; white-space: pre-line; word-break: break-word; }
td.ok { color: var(--ok); }
td.err { color: var(--err); }
.empty, .hint { color: var(--muted); padding: 24px; text-align: center; }
.bars { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-bottom: 12px; }
.bar-row { display: grid; grid-template-columns: minmax(120px, 30%) 1fr 110px; gap: 10px; align-items: center; padding: 3px 0; }
.bar-lbl, .bar-num { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-num { text-align: right; color: var(--muted); }
.bar-track { background: var(--bg); border-radius: 4px; height: 14px; overflow: hidden; }
.bar-fill { background: var(--accent); height: 100%; border-radius: 4px; display: flex; justify-content: flex-end; min-width: 2px; }
.bar-err { background: var(--err); height: 100%; }
.dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: var(--muted); }
.dot.ok { background: var(--ok); }
.dot.unreachable { background: var(--err); }
.dot.disabled { background: var(--border); }
.badge {
  display: inline-block; font: 11px/1.4 system-ui, sans-serif; color: var(--muted);
  border: 1px solid var(--border); border-radius: 4px; padding: 0 5px; margin-left: 6px;
  vertical-align: middle; white-space: nowrap;
}
select[multiple] { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
.q-wrap { display: grid; gap: 2px; min-width: 150px; }
.q-row { display: grid; grid-template-columns: 14px minmax(60px, 1fr) auto; gap: 6px; align-items: center; font-size: 11px; }
.q-track { display: block; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; height: 8px; overflow: hidden; }
.q-fill { display: block; height: 100%; }
.q-num { color: var(--muted); white-space: nowrap; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
dialog { background: var(--card); color: var(--fg); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; max-width: min(92vw, 640px); }
dialog::backdrop { background: rgba(0, 0, 0, 0.45); }
</style>
</head>
<body>
<header>
  <h1><span>✳</span> Asterlane 控制台</h1>
  <div id="auth">
    <input type="password" id="token" placeholder="Admin token" size="24">
    <button id="connect">连接</button>
    <span id="conn">未连接</span>
  </div>
</header>
<nav id="nav"></nav>
<main id="view"><p class="hint">输入 admin token 并点击「连接」</p></main>
<dialog id="tok-dialog"></dialog>
<script>
"use strict";
const $ = s => document.querySelector(s);
const TOKEN_KEY = "asterlane-admin-token";

function esc(v) {
  return String(v).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  })[c]);
}

async function api(path) {
  const token = sessionStorage.getItem(TOKEN_KEY) || "";
  const res = await fetch(path, { headers: { Authorization: "Bearer " + token } });
  if (res.status === 401) throw new Error("认证失败：token 无效");
  if (!res.ok) throw new Error("请求失败：HTTP " + res.status);
  return res.json();
}

async function apiWrite(method, path, body) {
  const token = sessionStorage.getItem(TOKEN_KEY) || "";
  const opts = { method, headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) { const j = await res.json().catch(() => ({})); throw new Error(j.error?.message || "HTTP " + res.status); }
  if (res.status === 204) return {}; // DELETE /admin/mcp-servers/{id} 等无响应体
  return res.json().catch(() => ({}));
}

function fmtCell(key, v) {
  if (v === null || v === undefined || v === "") return "";
  if (key === "status" && typeof v === "object" && v.kind)
    return v.kind + (v.code != null ? " " + v.code : "");
  if (key === "avg_latency_ms" && typeof v === "number") return v.toFixed(1);
  if (Array.isArray(v)) return v.map(x => typeof x === "object" ? JSON.stringify(x) : String(x)).join("\n");
  if (typeof v === "object") return JSON.stringify(v);
  return String(v);
}

function cellClass(key, v) {
  if (key !== "status") return "";
  const kind = typeof v === "object" && v ? v.kind : String(v);
  return /success/i.test(kind) ? "ok" : "err";
}

function objTable(rows, order) {
  if (!rows || !rows.length) return '<p class="empty">无数据</p>';
  const present = new Set();
  rows.forEach(r => Object.keys(r).forEach(k => present.add(k)));
  const cols = (order || []).filter(k => present.has(k))
    .concat([...present].filter(k => !(order || []).includes(k)));
  const head = cols.map(c => "<th>" + esc(c) + "</th>").join("");
  const body = rows.map(r =>
    "<tr>" + cols.map(c =>
      '<td class="' + cellClass(c, r[c]) + '">' + esc(fmtCell(c, r[c])) + "</td>"
    ).join("") + "</tr>"
  ).join("");
  return '<div class="tablewrap"><table><thead><tr>' + head + "</tr></thead><tbody>" + body + "</tbody></table></div>";
}

const TABS = {
  overview: { label: "总览", load: loadOverview },
  usage: { label: "用量", load: loadUsage },
  resources: { label: "资源", load: loadResources },
  mcp: { label: "MCP Servers", load: loadMcpServers },
  tools: { label: "工具", load: loadTools },
  keys: { label: "Proxy Keys", load: loadProxyKeys },
  keypools: { label: "Key Pools", load: loadKeyPools },
  events: { label: "事件", load: loadEvents },
  security: { label: "安全事件", load: loadSecurity },
  audit: { label: "审计", load: loadAudit },
  config: { label: "配置管理", load: loadConfig },
};
let current = "overview";

async function loadOverview(view) {
  const [health, stats] = await Promise.all([api("/admin/health"), api("/admin/stats")]);
  const card = (num, lbl) =>
    '<div class="card"><div class="num">' + esc(num) + '</div><div class="lbl">' + esc(lbl) + "</div></div>";
  view.innerHTML = '<div class="cards">'
    + card(health.status + " · v" + health.version, "网关状态")
    + card(stats.total_requests, "请求总数")
    + card(stats.total_errors, "错误数")
    + card(stats.avg_latency_ms.toFixed(1) + " ms", "平均延迟")
    + card(stats.total_rate_limit_hits, "限流命中")
    + card(stats.unique_tools, "活跃工具")
    + card(stats.unique_proxy_keys, "活跃 proxy key")
    + card(stats.unique_resources, "活跃资源")
    + "</div>";
}

async function loadUsage(view) {
  view.innerHTML = '<div class="toolbar">'
    + '<select id="us-dim">'
    + '<option value="tool">按工具</option><option value="domain">按 domain</option>'
    + '<option value="resource">按资源</option><option value="proxy_key">按 proxy key</option>'
    + '<option value="status">按状态</option>'
    + '<option value="bucket">按小时（趋势）</option></select>'
    + '<input type="datetime-local" id="us-from"><input type="datetime-local" id="us-to">'
    + '<button id="us-go">查询</button></div>'
    + '<div id="us-chart"></div><div id="us-table"></div>';
  const run = async () => {
    const p = new URLSearchParams({ group_by: $("#us-dim").value });
    if ($("#us-from").value) p.set("from", new Date($("#us-from").value).toISOString());
    if ($("#us-to").value) p.set("to", new Date($("#us-to").value).toISOString());
    try {
      const data = await api("/admin/usage?" + p);
      const rows = data.rows;
      if (!rows.length) {
        $("#us-chart").innerHTML = "";
        $("#us-table").innerHTML = '<p class="empty">无数据</p>';
        return;
      }
      const isBucket = $("#us-dim").value === "bucket";
      const max = Math.max(...rows.map(r => r.request_count));
      $("#us-chart").innerHTML = '<div class="bars">' + rows.map(r => {
        const w = max ? (r.request_count / max * 100) : 0;
        const ew = r.request_count ? (r.error_count / r.request_count * 100) : 0;
        const lbl = isBucket ? r.dimension_value.slice(5, 16).replace("T", " ") : r.dimension_value;
        return '<div class="bar-row"><span class="bar-lbl" title="' + esc(r.dimension_value) + '">'
          + esc(lbl) + '</span><div class="bar-track">'
          + '<div class="bar-fill" style="width:' + w + '%">'
          + '<div class="bar-err" style="width:' + ew + '%"></div></div></div>'
          + '<span class="bar-num">' + esc(r.request_count)
          + (r.error_count ? " (" + esc(r.error_count) + " 错)" : "") + "</span></div>";
      }).join("") + "</div>";
      $("#us-table").innerHTML = objTable(rows,
        ["dimension_value", "request_count", "error_count", "total_units", "avg_latency_ms", "rate_limit_hits"]);
    } catch (e) {
      $("#us-chart").innerHTML = "";
      $("#us-table").innerHTML = '<p class="empty">' + esc(e.message) + "</p>";
    }
  };
  $("#us-go").addEventListener("click", run);
  $("#us-dim").addEventListener("change", run);
  await run();
}

async function loadResources(view) {
  const rows = await api("/admin/resources");
  view.innerHTML = objTable(rows, ["id", "domain", "provider", "base_url", "endpoint_count"]);
}

async function loadTools(view) {
  const data = await api("/admin/tools");
  const render = filter => {
    const f = filter.trim().toLowerCase();
    const rows = data.tools.filter(t => !f
      || [t.name, t.resource_id, t.description, t.description_override]
        .some(v => (v || "").toLowerCase().includes(f)));
    let h = '<div class="tablewrap"><table><thead><tr><th>name</th><th>resource_id</th><th>description</th><th></th></tr></thead><tbody>';
    rows.forEach((t, i) => {
      // 有效描述 = override ?? 上游原始；override 徽标悬浮可见原始描述
      const badge = t.description_override
        ? '<span class="badge" title="原始描述: ' + esc(t.description || "（无）") + '">override</span>' : "";
      h += '<tr><td>' + esc(t.name) + '</td><td>' + esc(t.resource_id || "") + '</td>'
        + '<td>' + esc(t.description_override || t.description || "") + badge + '</td>'
        + '<td><button class="tool-debug" data-name="' + esc(t.name) + '" data-i="' + i + '">调试</button></td></tr>'
        + '<tr id="dbg-' + i + '" style="display:none"><td colspan="4"></td></tr>';
    });
    if (!rows.length) h += '<tr><td colspan="4" class="empty">无数据</td></tr>';
    h += '</tbody></table></div>';
    $("#tools-table").innerHTML = h;
    $("#tools-count").textContent = rows.length + " / " + data.total_count;
    $("#tools-table").querySelectorAll(".tool-debug").forEach(b =>
      b.addEventListener("click", () => toggleDebugPanel(b.dataset.name, $("#dbg-" + b.dataset.i))));
  };
  view.innerHTML = '<div class="toolbar"><input id="tools-filter" placeholder="按名称/资源/描述过滤" size="32">'
    + '<span id="tools-count" class="hint" style="padding:6px"></span></div><div id="tools-table"></div>';
  $("#tools-filter").addEventListener("input", e => render(e.target.value));
  render("");
}

// 工具调试面板：预填已存默认（GET defaults），调用（POST invoke）、存为默认（PUT defaults）
async function toggleDebugPanel(name, rowEl) {
  if (rowEl.style.display !== "none") { rowEl.style.display = "none"; return; }
  rowEl.style.display = "";
  const cell = rowEl.querySelector("td");
  cell.innerHTML = '<div class="card" style="margin:4px 0;min-width:0">'
    + '<div class="hint" style="padding:0 0 6px;text-align:left">调试调用 ' + esc(name) + '（参数为 JSON object）</div>'
    + '<textarea class="dbg-args" rows="5" spellcheck="false" style="width:100%;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px"></textarea>'
    + '<div class="toolbar" style="margin:8px 0 0"><button class="dbg-run">调用</button>'
    + '<button class="dbg-save">存为默认</button>'
    + '<span class="dbg-status hint" style="padding:6px;text-align:left"></span></div>'
    + '<pre class="dbg-result" style="white-space:pre-wrap;word-break:break-word;max-height:320px;overflow:auto;margin:8px 0 0"></pre></div>';
  const ta = cell.querySelector(".dbg-args"), st = cell.querySelector(".dbg-status"), out = cell.querySelector(".dbg-result");
  try {
    const d = await api("/admin/tools/" + encodeURIComponent(name) + "/defaults");
    ta.value = JSON.stringify(d.args, null, 2);
    st.textContent = "已加载存储默认（" + d.source + "）";
  } catch { ta.value = "{}"; }
  const parseArgs = () => {
    try {
      const v = JSON.parse(ta.value.trim() || "{}");
      if (typeof v !== "object" || v === null || Array.isArray(v)) { alert("参数必须是 JSON object"); return null; }
      return v;
    } catch { alert("参数不是合法 JSON"); return null; }
  };
  cell.querySelector(".dbg-run").addEventListener("click", async () => {
    const args = parseArgs(); if (args === null) return;
    st.textContent = "调用中…"; out.textContent = "";
    try {
      const r = await apiWrite("POST", "/admin/tools/" + encodeURIComponent(name) + "/invoke", args);
      st.textContent = "status " + r.status + " · " + r.latency_ms + " ms" + (r.request_id ? " · " + r.request_id : "");
      out.textContent = typeof r.result === "string" ? r.result : JSON.stringify(r.result, null, 2);
    } catch (e) { st.textContent = "调用失败"; out.textContent = e.message; }
  });
  cell.querySelector(".dbg-save").addEventListener("click", async () => {
    const args = parseArgs(); if (args === null) return;
    try {
      await apiWrite("PUT", "/admin/tools/" + encodeURIComponent(name) + "/defaults", args);
      st.textContent = "已存为默认参数";
    } catch (e) { alert(e.message); }
  });
}

// ── MCP Servers 页 ──

// 健康状态灯：ok 绿 / unreachable 红 / unknown 灰 / disabled 暗
function healthDot(h, id) {
  const s = ["ok", "unreachable", "unknown", "disabled"].includes(h?.status) ? h.status : "unknown";
  return '<span class="dot ' + s + '"' + (id ? ' id="' + id + '"' : "") + ' title="' + s + '"></span>';
}

// 工具介绍 override 面板：保存 = PUT metadata，清除 = DELETE（恢复上游原始描述）
function toggleMetaPanel(tool, rowEl, onSaved) {
  if (rowEl.style.display !== "none") { rowEl.style.display = "none"; return; }
  rowEl.style.display = "";
  const cell = rowEl.querySelector("td");
  cell.innerHTML = '<div class="card" style="margin:4px 0;min-width:0">'
    + '<div class="hint" style="padding:0 0 6px;text-align:left">介绍 override（覆盖上游 description）· 原始: '
    + esc(tool.description || "（无）") + '</div>'
    + '<textarea class="mt-text" rows="3" spellcheck="false" style="width:100%;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px">'
    + esc(tool.description_override || "") + '</textarea>'
    + '<div class="toolbar" style="margin:8px 0 0"><button class="mt-save">保存</button>'
    + '<button class="mt-clear">清除 override</button>'
    + '<span class="mt-status hint" style="padding:6px;text-align:left"></span></div></div>';
  const st = cell.querySelector(".mt-status");
  cell.querySelector(".mt-save").addEventListener("click", async () => {
    const text = cell.querySelector(".mt-text").value.trim();
    if (!text) { alert("介绍不能为空；恢复原始描述请用「清除 override」"); return; }
    try {
      await apiWrite("PUT", "/admin/tools/" + encodeURIComponent(tool.wire_name) + "/metadata", { description: text });
      st.textContent = "已保存";
      if (onSaved) await onSaved();
    } catch (e) { st.textContent = "保存失败：" + e.message; }
  });
  cell.querySelector(".mt-clear").addEventListener("click", async () => {
    try {
      await apiWrite("DELETE", "/admin/tools/" + encodeURIComponent(tool.wire_name) + "/metadata");
      st.textContent = "已清除";
      if (onSaved) await onSaved();
    } catch (e) { st.textContent = "清除失败：" + e.message; }
  });
}

async function loadMcpServers(view) {
  view.innerHTML = '<div class="toolbar"><button id="ms-new">+ 添加 MCP Server</button>'
    + '<span class="hint" style="padding:6px;text-align:left">行点击展开详情</span></div>'
    + '<div id="ms-form"></div><div id="ms-list"></div>';
  let servers = [];

  const refresh = async () => {
    try {
      const rows = await api("/admin/mcp-servers");
      servers = Array.isArray(rows) ? rows : [];
      renderList();
    } catch (e) {
      $("#ms-list").innerHTML = '<p class="empty">' + esc(e.message) + '（/admin/mcp-servers 端点未就绪或无权限）</p>';
    }
  };

  const renderList = () => {
    let h = '<div class="tablewrap"><table><thead><tr><th>状态</th><th>id</th><th>domain / provider</th>'
      + '<th>url</th><th>需要 key</th><th>工具数</th><th></th></tr></thead><tbody>';
    servers.forEach((s, i) => {
      h += '<tr class="ms-row" data-i="' + i + '" style="cursor:pointer">'
        + '<td>' + healthDot(s.health, "ms-dot-" + i) + '</td>'
        + '<td>' + esc(s.id) + (s.builtin ? '<span class="badge">builtin</span>' : "") + '</td>'
        + '<td>' + esc(s.domain || "") + " / " + esc(s.provider || "") + '</td>'
        + '<td>' + esc(s.url || "") + '</td>'
        + '<td>' + (s.requires_key ? "是（" + esc(s.auth_type || "?") + "）" : "否") + '</td>'
        + '<td>' + esc(s.tool_count ?? "") + '</td>'
        + '<td><button class="ms-probe" data-i="' + i + '">探测</button> '
        + '<button class="ms-edit" data-i="' + i + '">编辑</button> '
        + '<button class="ms-del" data-i="' + i + '">删除</button></td></tr>'
        + '<tr id="ms-detail-' + i + '" style="display:none"><td colspan="7"></td></tr>';
    });
    if (!servers.length) h += '<tr><td colspan="7" class="empty">无 MCP server</td></tr>';
    h += '</tbody></table></div>';
    $("#ms-list").innerHTML = h;
    $("#ms-list").querySelectorAll(".ms-row").forEach(tr =>
      tr.addEventListener("click", e => {
        if (e.target.closest("button")) return;
        toggleDetail(+tr.dataset.i);
      }));
    $("#ms-list").querySelectorAll(".ms-probe").forEach(b =>
      b.addEventListener("click", () => probe(+b.dataset.i, b)));
    $("#ms-list").querySelectorAll(".ms-edit").forEach(b =>
      b.addEventListener("click", () => openForm(servers[+b.dataset.i])));
    $("#ms-list").querySelectorAll(".ms-del").forEach(b =>
      b.addEventListener("click", async () => {
        const id = servers[+b.dataset.i].id;
        if (!confirm("删除 MCP server " + id + "？其工具将从目录移除")) return;
        try { await apiWrite("DELETE", "/admin/mcp-servers/" + encodeURIComponent(id)); await refresh(); }
        catch (e) { alert(e.message); }
      }));
  };

  const probe = async (i, btn) => {
    btn.disabled = true; btn.textContent = "探测中…";
    try {
      const r = await apiWrite("POST", "/admin/mcp-servers/" + encodeURIComponent(servers[i].id) + "/probe");
      servers[i].health = r.health || r; // 契约返回 health 对象本体，防御兼容包裹形
      const dot = $("#ms-dot-" + i);
      if (dot) dot.outerHTML = healthDot(servers[i].health, "ms-dot-" + i);
      const det = $("#ms-detail-" + i);
      if (det && det.style.display !== "none") await renderDetail(i);

    const cell = $("#ms-detail-" + i).querySelector("td");
    cell.innerHTML = '<p class="hint">加载中…</p>';
    let d;
    try { d = await api("/admin/mcp-servers/" + encodeURIComponent(servers[i].id)); }

    const hh = d.health || {}, lim = d.limits || {}, sec = d.security || {};
    const line = (k, v) => '<div><b>' + esc(k) + '</b>: ' + v + '</div>';

      + line("描述", dash(d.description))

        + " · last_check_at " + dash(hh.last_check_at)
        + " · last_ok_at " + dash(hh.last_ok_at)
        + " · latency_ms " + dash(hh.latency_ms)

      + line("限额", "rps " + dash(lim.rps) + " · rpm " + dash(lim.rpm) + " · max_concurrent " + dash(lim.max_concurrent))

        + " · result_budget_bytes " + dash(sec.result_budget_bytes));
    const tools = Array.isArray(d.tools) ? d.tools : [];
    h += '<h3 style="margin:12px 0 6px">工具（' + tools.length + '）</h3>';
    if (tools.length) {
      h += '<div class="tablewrap"><table><thead><tr><th>wire_name</th><th>描述（有效）</th><th></th></tr></thead><tbody>';
      tools.forEach((t, j) => {
        h += '<tr><td>' + esc(t.wire_name)
          + (t.description_override ? '<span class="badge" title="原始描述: ' + esc(t.description || "（无）") + '">override</span>' : "")
          + '</td><td>' + esc(t.description_override || t.description || "") + '</td>'
          + '<td><button class="mt-meta" data-j="' + j + '">介绍</button> '
          + '<button class="mt-dbg" data-j="' + j + '">调试</button></td></tr>'
          + '<tr id="mt-meta-' + i + '-' + j + '" style="display:none"><td colspan="3"></td></tr>'
          + '<tr id="mt-dbg-' + i + '-' + j + '" style="display:none"><td colspan="3"></td></tr>';
      });
      h += '</tbody></table></div>';
    } else h += '<p class="empty">无工具</p>';
    h += '</div>';
    cell.innerHTML = h;
    cell.querySelectorAll(".mt-meta").forEach(b =>
      b.addEventListener("click", () =>
        toggleMetaPanel(tools[+b.dataset.j], $("#mt-meta-" + i + "-" + b.dataset.j), () => renderDetail(i))));
    cell.querySelectorAll(".mt-dbg").forEach(b =>
      b.addEventListener("click", () =>
        toggleDebugPanel(tools[+b.dataset.j].wire_name, $("#mt-dbg-" + i + "-" + b.dataset.j))));
  };

  // 添加/编辑表单；凭据一律 secret ref，编辑不回显既有 ref
  const openForm = s => {
    const editing = !!s;
    s = s || {};
    const lim = s.limits || {};
    const f = $("#ms-form");
    const val = v => esc(v ?? "");
    f.innerHTML = '<div class="card" style="margin:8px 0">'
      + '<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:end">'
      + '<label>ID<br><input id="ms-id" size="12" value="' + val(s.id) + '"' + (editing ? " disabled" : "") + '></label>'
      + '<label>Domain<br><input id="ms-domain" size="10" value="' + val(s.domain) + '"></label>'
      + '<label>Provider<br><input id="ms-provider" size="10" value="' + val(s.provider) + '"></label>'
      + '<label>URL<br><input id="ms-url" size="28" value="' + val(s.url) + '"></label>'
      + '<label>描述<br><input id="ms-desc" size="18" value="' + val(s.description) + '"></label>'
      + '<label>Auth<br><select id="ms-auth">'
      + ["none", "bearer", "header"].map(t => '<option' + (s.auth_type === t ? " selected" : "") + '>' + t + '</option>').join("")
      + '</select></label>'
      + '<label id="ms-l-token">token_ref<br><input id="ms-token" size="24" placeholder="secret://env/NAME"></label>'
      + '<label id="ms-l-hname">Header 名<br><input id="ms-hname" size="10" placeholder="x-api-key"></label>'
      + '<label id="ms-l-hval">value_ref<br><input id="ms-hval" size="24" placeholder="secret://env/NAME"></label>'
      + '<label>测活<br><input type="checkbox" id="ms-hc"' + (s.health_check_enabled === false ? "" : " checked") + '></label>'
      + '<label>rps<br><input id="ms-rps" size="4" value="' + val(lim.rps) + '"></label>'
      + '<label>rpm<br><input id="ms-rpm" size="4" value="' + val(lim.rpm) + '"></label>'
      + '<label>max_concurrent<br><input id="ms-conc" size="4" value="' + val(lim.max_concurrent) + '"></label>'
      + '<button id="ms-save">' + (editing ? "保存" : "创建") + '</button><button id="ms-cancel">取消</button></div>'
      + '<div class="hint" style="padding:6px 0 0;text-align:left">凭据只收 secret ref（如 secret://env/NAME），不收明文密钥'
      + (editing ? '；编辑不回显既有 ref，auth 为 bearer/header 时需重新填写' : "") + '</div></div>';
    const syncAuth = () => {
      const t = $("#ms-auth").value;
      $("#ms-l-token").style.display = t === "bearer" ? "" : "none";
      $("#ms-l-hname").style.display = t === "header" ? "" : "none";
      $("#ms-l-hval").style.display = t === "header" ? "" : "none";
    };
    $("#ms-auth").addEventListener("change", syncAuth);
    syncAuth();
    $("#ms-cancel").addEventListener("click", () => { f.innerHTML = ""; });
    $("#ms-save").addEventListener("click", async () => {
      const refOk = r => r.startsWith("secret://");
      const body = {
        domain: $("#ms-domain").value.trim(),
        provider: $("#ms-provider").value.trim(),
        url: $("#ms-url").value.trim(),
        health_check: { enabled: $("#ms-hc").checked },
      };
      const id = editing ? s.id : $("#ms-id").value.trim();
      if (!editing) body.id = id;
      const desc = $("#ms-desc").value.trim();
      if (desc) body.description = desc;
      const at = $("#ms-auth").value;
      if (at === "bearer") {
        const ref = $("#ms-token").value.trim();
        if (!refOk(ref)) { alert("token_ref 必须是 secret ref（secret://…），不收明文密钥"); return; }
        body.auth = { type: "bearer", token_ref: ref };
      } else if (at === "header") {
        const name = $("#ms-hname").value.trim(), ref = $("#ms-hval").value.trim();
        if (!name) { alert("Header 名不能为空"); return; }
        if (!refOk(ref)) { alert("value_ref 必须是 secret ref（secret://…），不收明文密钥"); return; }
        body.auth = { type: "header", name, value_ref: ref };
      } else body.auth = { type: "none" };
      const lim2 = {};
      [["rps", "#ms-rps"], ["rpm", "#ms-rpm"], ["max_concurrent", "#ms-conc"]].forEach(([k, sel]) => {
        const v = parseInt($(sel).value, 10);
        if (v > 0) lim2[k] = v;
      });
      if (Object.keys(lim2).length) body.limits = lim2;
      try {
        const r = editing
          ? await apiWrite("PUT", "/admin/mcp-servers/" + encodeURIComponent(id), body)
          : await apiWrite("POST", "/admin/mcp-servers", body);
        if (r.health?.status === "unreachable")
          alert("已保存但连接失败" + (r.health.last_error ? "：" + r.health.last_error : "，可稍后「探测」重试"));
        f.innerHTML = "";
        await refresh();
      } catch (e) { alert(e.message); }
    });
  };

  $("#ms-new").addEventListener("click", () => openForm(null));
  await refresh();
}

// auth_mode 徽标：token 绿 / legacy 灰；字段缺失（后端未就绪）不渲染
function authBadge(mode) {
  if (mode === "token") return '<span class="badge" style="color:var(--ok);border-color:var(--ok);margin-left:0">token</span>';
  if (mode === "legacy") return '<span class="badge" style="margin-left:0">legacy</span>';
  return "";
}

// per-key 配额进度条：总量 + 当日两条；≥80% 橙、100% 红；无上限只显示计数；usage 缺失整体不渲染
function usageBars(u) {
  if (!u || typeof u !== "object") return "";
  const row = (lbl, count, max) => {
    const c = Number(count) || 0;
    if (max == null) return '<div class="q-row"><span>' + lbl + '</span><span></span><span class="q-num">' + c + '</span></div>';
    const pct = max > 0 ? Math.min(c / max * 100, 100) : 100;
    const color = pct >= 100 ? "var(--err)" : pct >= 80 ? "var(--warn)" : "var(--accent)";
    return '<div class="q-row"><span>' + lbl + '</span>'
      + '<span class="q-track" title="' + pct.toFixed(0) + '%"><span class="q-fill" style="width:' + pct.toFixed(0) + '%;background:' + color + '"></span></span>'
      + '<span class="q-num">' + c + "/" + max + '</span></div>';
  };
  return '<div class="q-wrap">' + row("总", u.calls_total, u.max_calls) + row("日", u.calls_today, u.max_calls_per_day) + '</div>';
}

// ── Proxy key token 签发/轮换弹窗 ──
// 安全红线：token 明文只存在于弹窗 DOM，不写 sessionStorage/localStorage/console；关闭即清空
function openTokenDialog(key, onDone) {
  const dlg = $("#tok-dialog");
  const mode = key.auth_mode === "token" ? "轮换" : "签发";
  let issued = false;
  dlg.innerHTML = '<h3 style="margin:0 0 8px">' + mode + ' token · ' + esc(key.id) + '</h3>'
    + (key.auth_mode === "token"
      ? '<div class="hint" style="padding:0 0 8px;text-align:left">该 key 已有 token，' + mode + '后旧 token 立即失效</div>' : "")
    + '<label>过期时间（可选，留空永不过期）<br><input type="datetime-local" id="tok-exp"></label>'
    + '<div class="toolbar" style="margin:10px 0 0"><button id="tok-go">' + mode + '</button>'
    + '<button id="tok-cancel">取消</button>'
    + '<span id="tok-status" class="hint" style="padding:6px;text-align:left"></span></div>';
  dlg.addEventListener("close", () => { dlg.innerHTML = ""; if (issued && onDone) onDone(); }, { once: true });
  dlg.showModal();
  $("#tok-cancel").addEventListener("click", () => dlg.close());
  $("#tok-go").addEventListener("click", async () => {
    const exp = $("#tok-exp").value;
    $("#tok-status").textContent = mode + "中…";
    let r;
    try {
      r = await apiWrite("POST", "/admin/proxy-keys/" + encodeURIComponent(key.id) + "/token",
        exp ? { expires_at: new Date(exp).toISOString() } : undefined);
    } catch (e) { $("#tok-status").textContent = e.message + "（端点未就绪或无权限）"; return; }
    if (!r || !r.token) { $("#tok-status").textContent = "响应缺少 token 字段"; return; }
    issued = true;
    dlg.innerHTML = '<h3 style="margin:0 0 8px">token 已' + mode + ' · ' + esc(key.id) + '</h3>'
      + '<div style="color:var(--err);font-weight:600;margin:0 0 10px">仅此一次展示，关闭后无法再查看，请立即保存</div>'
      + '<div style="display:flex;gap:8px;align-items:center">'
      + '<input id="tok-value" readonly value="' + esc(r.token) + '" size="48" style="flex:1;min-width:0;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px">'
      + '<button id="tok-copy">复制</button></div>'
      + '<div style="color:var(--muted);font-size:12px;margin-top:8px">过期时间：' + esc(r.expires_at || "永不过期") + '</div>'
      + '<div class="toolbar" style="margin:12px 0 0"><button id="tok-close">关闭</button></div>';
    $("#tok-copy").addEventListener("click", async () => {
      const inp = $("#tok-value");
      inp.select();
      try { await navigator.clipboard.writeText(inp.value); }
      catch { document.execCommand("copy"); } // 非安全上下文（http）时的兜底
      $("#tok-copy").textContent = "已复制";
    });
    $("#tok-close").addEventListener("click", () => dlg.close());
  });
}

      + '<label>Domain<br><input id="nr-domain" size="12"></label>'
      + '<label>Provider<br><input id="nr-provider" size="12"></label>'
      + '<label>Base URL<br><input id="nr-url" size="24"></label>'
      + '<label>描述<br><input id="nr-desc" size="20"></label>'
      + '<button id="nr-save">创建</button><button id="nr-cancel">取消</button>'
      + '</div></div></div>';
    h += '<div class="tablewrap"><table><thead><tr><th>id</th><th>domain</th><th>provider</th><th>base_url</th><th>endpoint_count</th><th></th></tr></thead><tbody>';
    resources.forEach(r => {
      h += '<tr><td>' + esc(r.id) + '</td><td>' + esc(r.domain) + '</td><td>' + esc(r.provider)
        + '</td><td>' + esc(r.base_url) + '</td><td>' + esc(r.endpoint_count)
        + '</td><td><button class="cfg-del-res" data-id="' + esc(r.id) + '">删除</button></td></tr>';
    });
    if (!resources.length) h += '<tr><td colspan="6" class="empty">无资源</td></tr>';
    h += '</tbody></table></div>';
    // proxy keys：结构化范围（多选）+ 限额；正则收进「高级」折叠区
    h += '<h3>Proxy Key 管理</h3><button id="cfg-new-key">+ 新建 Proxy Key</button>'
      + '<div id="cfg-key-form" style="display:none;margin:8px 0"><div class="card">'
      + '<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:end">'
      + '<label>ID<br><input id="nk-id" size="12"></label>'
      + '<label>显示名<br><input id="nk-name" size="12"></label>'
      + '<label>Page Size<br><input id="nk-ps" size="4" value="20"></label>'
      + '<label>rps<br><input id="nk-rps" size="4"></label>'
      + '<label>rpm<br><input id="nk-rpm" size="4"></label>'
      + '<label>max_calls<br><input id="nk-calls" size="7"></label></div>'
      + '<div style="display:flex;flex-wrap:wrap;gap:16px;margin-top:8px">'
      + '<label>允许的 MCP/资源（allowed_servers）<br><select id="nk-servers" multiple size="6" style="min-width:200px">'
      + serverOpts.map(o => '<option value="' + esc(o.id) + '">' + esc(o.id) + '（' + o.kind + '）</option>').join("")
      + '</select></label>'
      + '<div><label>允许的工具（allowed_tool_names）</label><br>'
      + '<input id="nk-toolfilter" placeholder="按名称过滤" size="14"> '
      + '<select id="nk-toolserver"><option value="">全部 server</option>'
      + toolServers.map(sid => '<option>' + esc(sid) + '</option>').join("") + '</select><br>'
      + '<select id="nk-tools" multiple size="6" style="min-width:280px;margin-top:4px">'
      + allTools.map(t => '<option value="' + esc(t.name) + '" data-res="' + esc(t.resource_id || "") + '">' + esc(t.name) + '</option>').join("")
      + '</select></div></div>'
      + (srcHint ? '<div class="hint" style="padding:4px 0 0;text-align:left">' + esc(srcHint) + ' 端点未就绪或无权限，范围选项可能不全</div>' : "")
      + '<details style="margin-top:8px"><summary style="cursor:pointer;color:var(--muted);font-size:12px">高级：正则 scope（allowed_tools / denied_tools）</summary>'
      + '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">'
      + '<label>Allowed（正则，逗号分隔）<br><input id="nk-allow" size="26"></label>'
      + '<label>Denied（正则，逗号分隔）<br><input id="nk-deny" size="26"></label></div></details>'
      + '<div class="toolbar" style="margin:10px 0 0"><button id="nk-save">创建</button><button id="nk-cancel">取消</button></div>'
      + '</div></div>';
    h += '<div class="tablewrap"><table><thead><tr><th>id</th><th>display_name</th><th>认证</th><th>用量/配额</th><th>servers</th><th>tool_names</th><th>limits</th><th>正则 scope</th><th>page_size</th><th></th></tr></thead><tbody>';
    keys.forEach((k, i) => {
      const lim = k.limits || {};
      const limStr = ["rps", "rpm", "max_calls"].filter(x => lim[x] != null).map(x => x + " " + lim[x]).join(" · ");
      const tn = k.allowed_tool_names || [];
      const rx = [(k.allowed_tools || []).length ? "allow: " + k.allowed_tools.join(", ") : "",
        (k.denied_tools || []).length ? "deny: " + k.denied_tools.join(", ") : ""].filter(Boolean).join("\n");
      h += '<tr><td>' + esc(k.id) + '</td><td>' + esc(k.display_name || "") + '</td>'
        + '<td>' + authBadge(k.auth_mode)
        + (k.expires_at ? '<div style="color:var(--muted);font-size:11px">到期 ' + esc(k.expires_at) + '</div>' : "") + '</td>'
        + '<td>' + usageBars(k.usage) + '</td>'
        + '<td>' + esc((k.allowed_servers || []).join(", ")) + '</td>'
        + '<td' + (tn.length ? ' title="' + esc(tn.join("\n")) + '"' : "") + '>' + (tn.length ? tn.length + " 个" : "") + '</td>'
        + '<td>' + esc(limStr) + '</td><td>' + esc(rx) + '</td>'
        + '<td>' + esc(k.default_tool_page_size ?? "") + '</td>'
        + '<td><button class="cfg-edit-key" data-i="' + i + '">编辑</button> '
        + '<button class="cfg-tok-issue" data-i="' + i + '">' + (k.auth_mode === "token" ? "轮换 token" : "签发 token") + '</button> '
        + (k.auth_mode === "token" ? '<button class="cfg-tok-revoke" data-id="' + esc(k.id) + '">吊销</button> ' : "")
        + '<button class="cfg-del-key" data-id="' + esc(k.id) + '">删除</button></td></tr>';
    });
    if (!keys.length) h += '<tr><td colspan="10" class="empty">无 Proxy Key</td></tr>';
    h += '</tbody></table></div>';
    view.innerHTML = h;
    // events
    $("#cfg-validate").addEventListener("click", async () => {
      try {
        const v = await api("/admin/config/validate");
        let t = v.valid ? '<span style="color:var(--ok)">✓ 配置有效</span>' : '<span style="color:var(--err)">✗ 配置存在问题</span>';
        t += ' · 资源 ' + v.resource_count + ' · Proxy Key ' + v.proxy_key_count + ' · MCP ' + v.mcp_server_count;
        if (v.issues.length) t += '<br>' + v.issues.map(i => '<span style="color:var(--' + (i.level === 'error' ? 'err' : 'muted') + ')">[' + esc(i.level) + '] ' + esc(i.target) + ': ' + esc(i.message) + '</span>').join('<br>');
        $("#cfg-vresult").innerHTML = '<div class="card" style="margin-top:8px">' + t + '</div>';
      } catch (e) { $("#cfg-vresult").innerHTML = '<p class="empty">' + esc(e.message) + '</p>'; }
    });
    // 导出当前合并配置快照（api() 只吃 JSON，这里要拿 YAML 原文，走裸 fetch + Blob 下载）
    $("#cfg-export").addEventListener("click", async () => {
      const msg = $("#cfg-export-msg");
      msg.textContent = "导出中…";
      try {
        const res = await fetch("/admin/config/export", {
          headers: { Authorization: "Bearer " + (sessionStorage.getItem(TOKEN_KEY) || ""), Accept: "text/yaml" },
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const url = URL.createObjectURL(await res.blob());
        const a = document.createElement("a");
        a.href = url; a.download = "gateway-export.yaml"; a.click();
        URL.revokeObjectURL(url);
        msg.textContent = "已导出";
      } catch (e) { msg.textContent = "导出失败：" + e.message + "（端点未就绪或无权限）"; }
    });
    $("#cfg-new-res").addEventListener("click", () => { $("#cfg-res-form").style.display = "block"; });
    $("#nr-cancel").addEventListener("click", () => { $("#cfg-res-form").style.display = "none"; });
    $("#nr-save").addEventListener("click", async () => {
      try {
        await apiWrite("POST", "/admin/resources", { id: $("#nr-id").value, domain: $("#nr-domain").value, provider: $("#nr-provider").value, base_url: $("#nr-url").value, description: $("#nr-desc").value });
        await render();
      } catch (e) { alert(e.message); }
    });
    view.querySelectorAll(".cfg-del-res").forEach(b => b.addEventListener("click", async () => {
      if (!confirm("删除资源 " + b.dataset.id + "？")) return;
      try { await apiWrite("DELETE", "/admin/resources/" + encodeURIComponent(b.dataset.id)); await render(); }
      catch (e) { alert(e.message); }
    }));
    // key 表单：新建与编辑共用；编辑时 ID 锁定、保存走 PUT
    const openKeyForm = k => {
      editingKeyId = k ? k.id : null;
      $("#cfg-key-form").style.display = "block";
      $("#nk-id").value = k ? k.id : ""; $("#nk-id").disabled = !!k;
      $("#nk-name").value = k?.display_name || "";
      $("#nk-ps").value = k?.default_tool_page_size ?? 20;
      const lim = k?.limits || {};
      $("#nk-rps").value = lim.rps ?? ""; $("#nk-rpm").value = lim.rpm ?? ""; $("#nk-calls").value = lim.max_calls ?? "";
      $("#nk-allow").value = (k?.allowed_tools || []).join(", ");
      $("#nk-deny").value = (k?.denied_tools || []).join(", ");
      const setSel = (el, vals) => [...el.options].forEach(o => { o.selected = vals.includes(o.value); });
      setSel($("#nk-servers"), k?.allowed_servers || []);
      setSel($("#nk-tools"), k?.allowed_tool_names || []);
      $("#nk-save").textContent = k ? "保存" : "创建";
    };
    $("#cfg-new-key").addEventListener("click", () => openKeyForm(null));
    view.querySelectorAll(".cfg-edit-key").forEach(b =>
      b.addEventListener("click", () => openKeyForm(keys[+b.dataset.i])));
    view.querySelectorAll(".cfg-tok-issue").forEach(b =>
      b.addEventListener("click", () => openTokenDialog(keys[+b.dataset.i], render)));
    view.querySelectorAll(".cfg-tok-revoke").forEach(b => b.addEventListener("click", async () => {
      if (!confirm("吊销 " + b.dataset.id + " 的 token？吊销后该 key 回到 legacy（id-only）模式")) return;
      try { await apiWrite("DELETE", "/admin/proxy-keys/" + encodeURIComponent(b.dataset.id) + "/token"); await render(); }
      catch (e) { alert(e.message + "（端点未就绪或无权限）"); }
    }));
    $("#nk-cancel").addEventListener("click", () => { $("#cfg-key-form").style.display = "none"; editingKeyId = null; });
    // 工具多选过滤：文本 + 按 server（隐藏不匹配项，已选中项保持选中）
    const filterTools = () => {
      const f = $("#nk-toolfilter").value.trim().toLowerCase();
      const srv = $("#nk-toolserver").value;
      [...$("#nk-tools").options].forEach(o => {
        o.hidden = Boolean((f && !o.value.toLowerCase().includes(f)) || (srv && o.dataset.res !== srv));
      });
    };
    $("#nk-toolfilter").addEventListener("input", filterTools);
    $("#nk-toolserver").addEventListener("change", filterTools);
    $("#nk-save").addEventListener("click", async () => {
      const split = s => s ? s.split(",").map(x => x.trim()).filter(Boolean) : [];
      const picked = el => [...el.selectedOptions].map(o => o.value);
      const body = {
        id: editingKeyId || $("#nk-id").value.trim(),
        display_name: $("#nk-name").value,
        allowed_tools: split($("#nk-allow").value),
        denied_tools: split($("#nk-deny").value),
        default_tool_page_size: parseInt($("#nk-ps").value, 10) || 20,
        allowed_servers: picked($("#nk-servers")),
        allowed_tool_names: picked($("#nk-tools")),
      };
      const lim = {};
      [["rps", "#nk-rps"], ["rpm", "#nk-rpm"], ["max_calls", "#nk-calls"]].forEach(([kk, sq]) => {
        const v = parseInt($(sq).value, 10);
        if (v > 0) lim[kk] = v;
      });
      if (Object.keys(lim).length) body.limits = lim;
      try {
        if (editingKeyId) await apiWrite("PUT", "/admin/proxy-keys/" + encodeURIComponent(editingKeyId), body);
        else await apiWrite("POST", "/admin/proxy-keys", body);
        editingKeyId = null;
        await render();
      } catch (e) { alert(e.message); }
    });
    view.querySelectorAll(".cfg-del-key").forEach(b => b.addEventListener("click", async () => {
      if (!confirm("删除 Proxy Key " + b.dataset.id + "？")) return;
      try { await apiWrite("DELETE", "/admin/proxy-keys/" + encodeURIComponent(b.dataset.id)); await render(); }
      catch (e) { alert(e.message); }
    }));
  };
  await render();
}

function buildNav() {
  const nav = $("#nav");
  nav.innerHTML = "";
  for (const [key, tab] of Object.entries(TABS)) {
    const b = document.createElement("button");
    b.textContent = tab.label;
    b.className = key === current ? "active" : "";
    b.addEventListener("click", () => { current = key; buildNav(); loadCurrent(); });
    nav.appendChild(b);
  }
}

async function loadCurrent() {
  const view = $("#view");
  view.innerHTML = '<p class="hint">加载中…</p>';
  try {
    await TABS[current].load(view);
  } catch (e) {
    view.innerHTML = '<p class="empty">' + esc(e.message) + "</p>";
  }
}

async function connect() {
  const conn = $("#conn");
  conn.textContent = "连接中…"; conn.className = "";
  try {
    const health = await api("/admin/health");
    conn.textContent = "已连接 · v" + health.version; conn.className = "ok";
    buildNav();
    await loadCurrent();
  } catch (e) {
    conn.textContent = e.message; conn.className = "err";
    $("#view").innerHTML = '<p class="hint">' + esc(e.message) + "</p>";
  }
}

$("#connect").addEventListener("click", () => {
  sessionStorage.setItem(TOKEN_KEY, $("#token").value.trim());
  connect();
});
$("#token").addEventListener("keydown", e => { if (e.key === "Enter") $("#connect").click(); });

if (sessionStorage.getItem(TOKEN_KEY)) {
  $("#token").value = sessionStorage.getItem(TOKEN_KEY);
  connect();
}
</script>
</body>
</html>
