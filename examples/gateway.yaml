schema_version: 1

# Admin API 与 Web 控制台认证（见 docs/admin-console.md）。
# 未配置 keys 时 /admin/* 整体不挂载；token 只存 secret ref，不存明文。
admin:
  keys:
    - id: ops-primary
      token_ref: secret://env/ASTERLANE_ADMIN_TOKEN

# 语义工具搜索（可选）：OpenAI-compatible embeddings 端点。
# 启用后 asterlane__search_tools 按余弦相似度排序，端点故障自动回退关键词。
# 注意：工具名称/描述与搜索 query 会发送到该端点（数据出境）。
# semantic_search:
#   base_url: https://api.openai.com/v1
#   model: text-embedding-3-small
#   api_key_ref: secret://env/OPENAI_API_KEY   # 本地 Ollama 等无鉴权端点可省略
#   timeout_secs: 15

# 平台内置 MCP preset（可选）：一行启用免鉴权 hosted MCP server。
# 可用 preset：exa（search）、deepwiki（docs）、context7（docs），
# 展开语义与 preset 表见 docs/config-schema.md「Builtin MCP Presets」。
# 注意：启用后网关启动时会连接对应外部 MCP server。
# builtin_mcp: [exa]

api_resources:
  - id: tavily
    domain: search
    provider: tavily
    base_url: https://api.tavily.com
    description: Tavily web search API wrapped as MCP tools.
    auth:
      type: bearer
      token_ref: secret://tavily/default
    # 多 key 池（可选）：存在时按策略选 key 并 per-key 解析凭据，
    # auth 只提供注入形状，其单 ref 不再使用。见 docs/config-schema.md。
    # key_pool:
    #   strategy: round_robin   # round_robin | random | least_requests | fastest_response | weighted
    #   keys:
    #     - ref: secret://tavily/key-a
    #       weight: 2
    #     - ref: secret://tavily/key-b
    # 上游限额（可选，缺省不限；数值必须 > 0，0 值启动/CRUD 期报错。
    # mcp_servers 条目同样支持。见 docs/mcp-governance-and-key-limits.md §3）：
    # limits:
    #   rps: 10                  # 每秒请求数（GCRA）
    #   rpm: 300                 # 每分钟请求数
    #   max_concurrent: 4        # 并发上限（队列准入，调用期间持有槽位）
    #   queue_timeout_secs: 10   # 排队超时秒数，缺省 10
    endpoints:
      - tool: web_search
        method: POST
        path: /search
        description: Search the web with Tavily.

  - id: exa
    domain: search
    provider: exa
    base_url: https://api.exa.ai
    description: Exa neural search API wrapped as MCP tools.
    auth:
      type: header
      name: x-api-key
      value_ref: secret://exa/default
    endpoints:
      - tool: neural_search
        method: POST
        path: /search
        description: Search the web with Exa.

  - id: jina
    domain: reader
    provider: jina
    base_url: https://r.jina.ai
    description: Jina reader endpoint wrapped as MCP tools.
    auth:
      type: bearer
      token_ref: secret://jina/default
    endpoints:
      - tool: reader
        method: GET
        path: /{url}
        description: Fetch a readable page representation through Jina.

proxy_keys:
  - id: agent-search-basic
    display_name: Basic search agent
    # 三段 wire name 格式: domain__provider__tool（见 docs/naming-convention.md）。
    # allowed_tools 正则可使用冒号形式（policy 层翻译为 wire name 匹配）或直接用 wire name 形式。
    allowed_tools:
      - '^search:tavily:web_search$'      # tavily — 冒号形式，policy 层翻译为 ^search__tavily__web_search$
      - '^reader:jina:reader$'            # jina
    denied_tools: []
    default_tool_page_size: 5

  - id: agent-search-research
    display_name: Research agent with all search tools
    allowed_tools:
      - '^search:.*$'                     # 冒号形式，翻译为 ^search__.*$
      - '^reader:.*$'                     # 冒号形式，翻译为 ^reader__.*$
    denied_tools: []
    default_tool_page_size: 2
    # 结构化范围（可选，与 allowed_tools 正则取并集；denied_tools 仍最高优先；
    # 三个允许列表全空 = 全拒绝。见 docs/mcp-governance-and-key-limits.md §2）：
    # allowed_servers: [tavily, exa]                      # resource/mcp server id 白名单，命中即放行该上游全部工具
    # allowed_tool_names: [search__exa__neural_search]    # 精确 wire name 白名单
    # Per-key 限额（可选，缺省不限；数值必须 > 0。见 §3）：
    # limits:
    #   rps: 5
    #   rpm: 60
    #   max_calls: 10000   # 累计调用配额；配置 store 时跨重启累计，否则重启归零
