schema_version: 1

api_resources:
  - id: tavily
    domain: search
    provider: tavily
    base_url: https://api.tavily.com
    description: Tavily web search API wrapped as MCP tools.
    auth:
      type: bearer
      token_ref: secret://tavily/default
    endpoints:
      - tool: web_search
        method: POST
        path: /search
        description: Search the web with Tavily.

  - id: exa
    domain: search
    provider: exa
    base_url: https://api.exa.ai
    description: Exa neural search API wrapped as MCP tools.
    auth:
      type: header
      name: x-api-key
      value_ref: secret://exa/default
    endpoints:
      - tool: neural_search
        method: POST
        path: /search
        description: Search the web with Exa.

  - id: jina
    domain: reader
    provider: jina
    base_url: https://r.jina.ai
    description: Jina reader endpoint wrapped as MCP tools.
    auth:
      type: bearer
      token_ref: secret://jina/default
    endpoints:
      - tool: reader
        method: GET
        path: /{url}
        description: Fetch a readable page representation through Jina.

proxy_keys:
  - id: agent-search-basic
    display_name: Basic search agent
    # 四段 wire name 格式: domain__provider__tool__method（见 docs/naming-convention.md）。
    # allowed_tools 正则可使用冒号形式（policy 层翻译为 wire name 匹配）或直接用 wire name 形式。
    allowed_tools:
      - '^search:tavily:web_search:.*$'   # tavily — 冒号形式，policy 层翻译为 ^search__tavily__web_search__.*$
      - '^reader:jina:reader:.*$'         # jina
    denied_tools: []
    default_tool_page_size: 5

  - id: agent-search-research
    display_name: Research agent with all search tools
    allowed_tools:
      - '^search:.*$'                     # 冒号形式，翻译为 ^search__.*$
      - '^reader:.*$'                     # 冒号形式，翻译为 ^reader__.*$
    denied_tools: []
    default_tool_page_size: 2
